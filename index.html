<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liquid Glass Photo Editor</title>

<style>

@import url('https://fonts.cdnfonts.com/css/sf-pro-display');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;

    font-family:
    'SF Pro Display',
    sans-serif;
}

html,
body{

    width:100%;
    height:100%;

    background:#04070f;

    overflow:hidden;
}

body{

    background:
    radial-gradient(circle at top left,#7c5cff 0%,transparent 30%),
    radial-gradient(circle at bottom right,#19c37d 0%,transparent 30%),
    linear-gradient(135deg,#09111f,#0f172a,#04070f);

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;
}

.container{

    width:100%;

    height:calc(100vh - 40px);

    display:flex;

    gap:24px;

    padding:24px;

    border-radius:46px;

    background:
    rgba(255,255,255,0.05);

    backdrop-filter:
    blur(30px);

    border:
    1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 30px 60px rgba(0,0,0,0.35);

    overflow:hidden;
}

/* ===================================================== */
/* SIDEBAR                                                */
/* ===================================================== */

.sidebar{

    width:420px;

    padding:30px;

    border-radius:40px;

    overflow-y:auto;

    background:
    rgba(255,255,255,0.04);

    backdrop-filter:
    blur(25px);

    border:
    1px solid rgba(255,255,255,0.08);

    scrollbar-width:thin;

    scrollbar-color:
    rgba(255,255,255,0.25)
    transparent;
}

/* ===================================================== */
/* LIQUID GLASS SCROLLBAR                                */
/* ===================================================== */

.sidebar::-webkit-scrollbar,
.tools-box::-webkit-scrollbar{

    width:14px;
}

.sidebar::-webkit-scrollbar-track,
.tools-box::-webkit-scrollbar-track{

    background:
    rgba(255,255,255,0.03);

    border-radius:999px;

    backdrop-filter:
    blur(25px);
}

.sidebar::-webkit-scrollbar-thumb,
.tools-box::-webkit-scrollbar-thumb{

    border-radius:999px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.28),
        rgba(255,255,255,0.08)
    );

    border:
    1px solid rgba(255,255,255,0.18);

    box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.45),
    0 4px 14px rgba(0,0,0,0.25);

    backdrop-filter:
    blur(25px);
}

/* ===================================================== */
/* TEXT                                                   */
/* ===================================================== */

.sidebar h1{

    color:white;

    font-size:52px;

    font-weight:700;

    margin-bottom:8px;
}

.subtitle{

    color:
    rgba(255,255,255,0.6);

    margin-bottom:40px;
}

.group{

    margin-bottom:38px;
}

.group h2{

    color:white;

    font-size:18px;

    margin-bottom:18px;
}

/* ===================================================== */
/* SLIDER                                                 */
/* ===================================================== */

.slider-box{

    margin-bottom:24px;
}

.slider-box label{

    display:flex;

    justify-content:space-between;

    color:white;

    margin-bottom:10px;

    font-size:15px;
}

input[type="range"]{

    width:100%;

    appearance:none;

    height:8px;

    border-radius:999px;

    background:
    rgba(255,255,255,0.1);
}

input[type="range"]::-webkit-slider-thumb{

    appearance:none;

    width:24px;
    height:24px;

    border-radius:50%;

    background:white;

    cursor:pointer;

    box-shadow:
    0 0 16px rgba(255,255,255,0.7);
}

/* ===================================================== */
/* FILTER PREVIEW                                         */
/* ===================================================== */

.filter-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:18px;
}

.filter-card{

    padding:12px;

    border-radius:26px;

    background:
    rgba(255,255,255,0.05);

    backdrop-filter:
    blur(25px);

    border:
    1px solid rgba(255,255,255,0.10);

    cursor:pointer;

    transition:.25s;
}

.filter-card.active{

    border:
    1px solid rgba(255,255,255,0.25);

    box-shadow:
    0 0 20px rgba(255,255,255,0.08);
}

.filter-preview{

    width:100%;

    height:100px;

    border-radius:18px;

    background-image:
    url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1000');

    background-size:cover;

    background-position:center;

    margin-bottom:10px;

    border:
    1px solid rgba(255,255,255,0.12);
}

.filter-name{

    color:white;

    text-align:center;

    font-size:14px;

    font-weight:600;
}

.filter-slider{

    display:none;

    margin-top:14px;
}

.filter-slider.active{

    display:block;
}

/* ===================================================== */
/* FILTER EFFECT PREVIEW                                 */
/* ===================================================== */

.preview-bw{
    filter:grayscale(100%);
}

.preview-warm{
    filter:sepia(70%) saturate(130%);
}

.preview-cool{
    filter:hue-rotate(180deg);
}

.preview-vintage{
    filter:sepia(45%) contrast(110%);
}

.preview-dreamy{
    filter:blur(1px) brightness(110%);
}

.preview-neon{
    filter:saturate(200%) contrast(130%);
}

.preview-fade{
    filter:contrast(80%) brightness(110%);
}

.preview-cinema{
    filter:contrast(120%) saturate(70%);
}

.preview-soft{
    filter:brightness(115%) saturate(80%);
}

.preview-dark{
    filter:brightness(70%) contrast(120%);
}

/* ===================================================== */
/* LIQUID BUTTONS                                         */
/* ===================================================== */

.upload-btn,
.tool-btn{

    position:relative;

    overflow:hidden;

    background:
    rgba(255,255,255,0.05);

    backdrop-filter:
    blur(25px);

    border:
    1px solid rgba(255,255,255,0.18);

    box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.45),
    inset 0 -1px 1px rgba(255,255,255,0.06),
    0 10px 24px rgba(0,0,0,0.25);

    transition:.25s;
}

.upload-btn::before,
.tool-btn::before{

    content:"";

    position:absolute;

    inset:1px;

    border-radius:inherit;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.18),
        rgba(255,255,255,0.02)
    );
}

/* ===================================================== */
/* EDITOR                                                 */
/* ===================================================== */

.editor{

    flex:1;

    display:flex;

    flex-direction:column;

    gap:24px;

    min-height:0;
}

.topbar{

    height:92px;

    min-height:92px;

    padding:14px;

    border-radius:40px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    background:
    rgba(255,255,255,0.04);

    backdrop-filter:
    blur(25px);

    border:
    1px solid rgba(255,255,255,0.08);
}

.topbar h2{

    color:white;

    font-size:28px;

    padding-left:18px;
}

.upload-btn{

    width:280px;

    height:62px;

    border-radius:999px;

    display:flex;

    justify-content:center;

    align-items:center;

    cursor:pointer;

    color:white;

    font-weight:600;
}

.workspace{

    flex:1;

    display:flex;

    gap:24px;

    min-height:0;
}

/* ===================================================== */
/* PHOTO BOX                                              */
/* ===================================================== */

.photo-box{

    flex:1;

    position:relative;

    overflow:hidden;

    border-radius:40px;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    rgba(255,255,255,0.04);

    backdrop-filter:
    blur(25px);

    border:
    1px solid rgba(255,255,255,0.08);

    min-height:0;
}

canvas{

    border-radius:22px;

    cursor:crosshair;

    max-width:100%;
    max-height:100%;
}

/* ===================================================== */
/* TOOLS                                                  */
/* ===================================================== */

.tools-box{

    width:130px;

    padding:20px;

    border-radius:40px;

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:18px;

    background:
    rgba(255,255,255,0.04);

    backdrop-filter:
    blur(25px);

    border:
    1px solid rgba(255,255,255,0.08);

    overflow-y:auto;
}

.tools-title{

    color:white;

    font-size:22px;

    font-weight:700;

    margin-bottom:4px;
}

/* ===================================================== */
/* TOOL BUTTON BULAT                                      */
/* ===================================================== */

.tool-btn{

    width:68px;
    height:68px;

    border:none;

    border-radius:50%;

    cursor:pointer;

    display:flex;

    justify-content:center;

    align-items:center;

    flex-shrink:0;
}

.tool-icon{

    width:28px;
    height:28px;

    filter:
    brightness(0)
    invert(1);

    z-index:2;
}

/* ===================================================== */
/* CROP WARNING                                           */
/* ===================================================== */

.crop-warning{

    position:absolute;

    top:20px;

    left:50%;

    transform:translateX(-50%);

    display:none;

    padding:14px 22px;

    border-radius:999px;

    color:white;

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:
    blur(25px);

    border:
    1px solid rgba(255,255,255,0.2);

    z-index:99;
}

</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h1>Photo Editor</h1>

        <div class="subtitle">
            Liquid Glass Interface
        </div>

        <!-- ADJUSTMENTS -->

        <div class="group">

            <h2>Adjustments</h2>

            <div class="slider-box">

                <label>
                    Brightness
                    <span id="brightnessValue">0%</span>
                </label>

                <input
                type="range"
                id="brightness"
                min="-100"
                max="100"
                value="0">

            </div>

            <div class="slider-box">

                <label>
                    Contrast
                    <span id="contrastValue">0%</span>
                </label>

                <input
                type="range"
                id="contrast"
                min="-100"
                max="100"
                value="0">

            </div>

            <div class="slider-box">

                <label>
                    Saturation
                    <span id="saturationValue">0%</span>
                </label>

                <input
                type="range"
                id="saturation"
                min="-100"
                max="100"
                value="0">

            </div>

        </div>

        <!-- FILTERS -->

        <div class="group">

            <h2>Filters</h2>

            <div class="filter-grid">

                <div class="filter-card" onclick="toggleFilter(this,'bw')">

                    <div class="filter-preview preview-bw"></div>

                    <div class="filter-name">B&W</div>

                    <div class="filter-slider" id="bwSlider">

                        <input
                        type="range"
                        min="0"
                        max="100"
                        value="0"
                        oninput="updateFilter('bw',this.value)">

                    </div>

                </div>

                <div class="filter-card" onclick="toggleFilter(this,'warm')">

                    <div class="filter-preview preview-warm"></div>

                    <div class="filter-name">Warm</div>

                    <div class="filter-slider" id="warmSlider">

                        <input
                        type="range"
                        min="0"
                        max="100"
                        value="0"
                        oninput="updateFilter('warm',this.value)">

                    </div>

                </div>

                <div class="filter-card" onclick="toggleFilter(this,'cool')">

                    <div class="filter-preview preview-cool"></div>

                    <div class="filter-name">Cool</div>

                    <div class="filter-slider" id="coolSlider">

                        <input
                        type="range"
                        min="0"
                        max="100"
                        value="0"
                        oninput="updateFilter('cool',this.value)">

                    </div>

                </div>

                <div class="filter-card" onclick="toggleFilter(this,'vintage')">

                    <div class="filter-preview preview-vintage"></div>

                    <div class="filter-name">Vintage</div>

                    <div class="filter-slider" id="vintageSlider">

                        <input
                        type="range"
                        min="0"
                        max="100"
                        value="0"
                        oninput="updateFilter('vintage',this.value)">

                    </div>

                </div>

                <div class="filter-card" onclick="toggleFilter(this,'dreamy')">

                    <div class="filter-preview preview-dreamy"></div>

                    <div class="filter-name">Dreamy</div>

                    <div class="filter-slider" id="dreamySlider">

                        <input
                        type="range"
                        min="0"
                        max="100"
                        value="0"
                        oninput="updateFilter('dreamy',this.value)">

                    </div>

                </div>

                <div class="filter-card" onclick="toggleFilter(this,'neon')">

                    <div class="filter-preview preview-neon"></div>

                    <div class="filter-name">Neon</div>

                    <div class="filter-slider" id="neonSlider">

                        <input
                        type="range"
                        min="0"
                        max="100"
                        value="0"
                        oninput="updateFilter('neon',this.value)">

                    </div>

                </div>

                <div class="filter-card" onclick="toggleFilter(this,'fade')">

                    <div class="filter-preview preview-fade"></div>

                    <div class="filter-name">Fade</div>

                    <div class="filter-slider" id="fadeSlider">

                        <input
                        type="range"
                        min="0"
                        max="100"
                        value="0"
                        oninput="updateFilter('fade',this.value)">

                    </div>

                </div>

                <div class="filter-card" onclick="toggleFilter(this,'cinema')">

                    <div class="filter-preview preview-cinema"></div>

                    <div class="filter-name">Cinema</div>

                    <div class="filter-slider" id="cinemaSlider">

                        <input
                        type="range"
                        min="0"
                        max="100"
                        value="0"
                        oninput="updateFilter('cinema',this.value)">

                    </div>

                </div>

                <div class="filter-card" onclick="toggleFilter(this,'soft')">

                    <div class="filter-preview preview-soft"></div>

                    <div class="filter-name">Soft</div>

                    <div class="filter-slider" id="softSlider">

                        <input
                        type="range"
                        min="0"
                        max="100"
                        value="0"
                        oninput="updateFilter('soft',this.value)">

                    </div>

                </div>

                <div class="filter-card" onclick="toggleFilter(this,'dark')">

                    <div class="filter-preview preview-dark"></div>

                    <div class="filter-name">Dark</div>

                    <div class="filter-slider" id="darkSlider">

                        <input
                        type="range"
                        min="0"
                        max="100"
                        value="0"
                        oninput="updateFilter('dark',this.value)">

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- EDITOR -->

    <div class="editor">

        <div class="topbar">

            <h2>Liquid Glass Editor</h2>

            <label class="upload-btn">

                Upload Photo

                <input
                type="file"
                id="upload"
                accept="image/*"
                hidden>

            </label>

        </div>

        <div class="workspace">

            <div
            class="photo-box"
            id="canvasContainer">

                <div
                class="crop-warning"
                id="cropWarning">

                    ✂ Crop Mode Aktif

                </div>

                <canvas id="canvas"></canvas>

            </div>

            <!-- TOOLS -->

            <div class="tools-box">

                <div class="tools-title">
                    Tools
                </div>

                <button
                class="tool-btn"
                id="cropBtn"
                onclick="activateCrop(this)">

                    <img
                    src="https://img.icons8.com/ios-filled/100/FFFFFF/crop.png"
                    class="tool-icon">

                </button>

                <button
                class="tool-btn"
                onclick="activateTool(this); rotateImage();">

                    <img
                    src="https://img.icons8.com/ios-filled/100/FFFFFF/rotate-right.png"
                    class="tool-icon">

                </button>

                <button
                class="tool-btn"
                onclick="activateTool(this); flipImage();">

                    <img
                    src="https://img.icons8.com/ios-filled/100/FFFFFF/flip-horizontal.png"
                    class="tool-icon">

                </button>

                <button
                class="tool-btn"
                onclick="activateTool(this); zoomIn();">

                    <img
                    src="https://img.icons8.com/ios-filled/100/FFFFFF/zoom-in.png"
                    class="tool-icon">

                </button>

                <button
                class="tool-btn"
                onclick="activateTool(this); zoomOut();">

                    <img
                    src="https://img.icons8.com/ios-filled/100/FFFFFF/zoom-out.png"
                    class="tool-icon">

                </button>

                <button
                class="tool-btn"
                onclick="activateTool(this); resetImage();">

                    <img
                    src="https://img.icons8.com/ios-filled/100/FFFFFF/restart.png"
                    class="tool-icon">

                </button>

                <button
                class="tool-btn"
                onclick="activateTool(this); downloadImage();">

                    <img
                    src="https://img.icons8.com/ios-filled/100/FFFFFF/download--v1.png"
                    class="tool-icon">

                </button>

            </div>

        </div>

    </div>

</div>

<script>

/* ===================================================== */
/* ELEMENTS                                               */
/* ===================================================== */

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const upload =
document.getElementById("upload");

const cropWarning =
document.getElementById("cropWarning");

const canvasContainer =
document.getElementById("canvasContainer");

const brightnessSlider =
document.getElementById("brightness");

const contrastSlider =
document.getElementById("contrast");

const saturationSlider =
document.getElementById("saturation");

const brightnessValue =
document.getElementById("brightnessValue");

const contrastValue =
document.getElementById("contrastValue");

const saturationValue =
document.getElementById("saturationValue");

/* ===================================================== */
/* IMAGE STATE                                            */
/* ===================================================== */

let img = new Image();

let originalImage = "";

let currentImage = "";

let scale = 1;

let rotation = 0;

let flip = 1;

let cropMode = false;

/* ===================================================== */
/* FILTERS                                                */
/* ===================================================== */

let filters = {

    bw:0,
    warm:0,
    cool:0,
    vintage:0,
    dreamy:0,
    neon:0,
    fade:0,
    cinema:0,
    soft:0,
    dark:0
};

/* ===================================================== */
/* ADJUSTMENTS VALUE                                      */
/* ===================================================== */

let adjustments = {

    brightness:100,
    contrast:100,
    saturation:100
};

/* ===================================================== */
/* CROP STATE                                             */
/* ===================================================== */

let isDragging = false;

let cropStartX = 0;
let cropStartY = 0;

let cropEndX = 0;
let cropEndY = 0;

/* ===================================================== */
/* UPLOAD IMAGE                                           */
/* ===================================================== */

upload.addEventListener("change",(e)=>{

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){

        img = new Image();

        img.onload = ()=>{

            originalImage =
            event.target.result;

            currentImage =
            event.target.result;

            scale = 1;
            rotation = 0;
            flip = 1;

            resizeCanvas();

            drawImage();
        };

        img.src =
        event.target.result;
    };

    reader.readAsDataURL(file);
});

/* ===================================================== */
/* RESIZE CANVAS                                          */
/* ===================================================== */

function resizeCanvas(){

    canvas.width =
    canvasContainer.clientWidth - 40;

    canvas.height =
    canvasContainer.clientHeight - 40;
}

/* ===================================================== */
/* DRAW IMAGE                                             */
/* ===================================================== */

function drawImage(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    if(!img.src) return;

    ctx.filter = `
    brightness(${adjustments.brightness - filters.dark * 0.3 + filters.soft * 0.1}%)
    contrast(${adjustments.contrast + filters.neon * 0.3 + filters.cinema * 0.2}%)
    saturate(${adjustments.saturation + filters.neon + filters.warm * 0.3}%)
    grayscale(${filters.bw}%)
    sepia(${filters.warm * 0.7 + filters.vintage * 0.5}%)
    blur(${filters.dreamy * 0.02}px)
    hue-rotate(${filters.cool * 1.5}deg)
    opacity(${100 - filters.fade * 0.15}%)
    `;

    const imageAspect =
    img.width / img.height;

    const canvasAspect =
    canvas.width / canvas.height;

    let renderWidth;
    let renderHeight;

    if(imageAspect > canvasAspect){

        renderWidth =
        canvas.width * 0.9 * scale;

        renderHeight =
        renderWidth / imageAspect;
    }
    else{

        renderHeight =
        canvas.height * 0.9 * scale;

        renderWidth =
        renderHeight * imageAspect;
    }

    ctx.save();

    ctx.translate(
        canvas.width / 2,
        canvas.height / 2
    );

    ctx.scale(flip,1);

    ctx.rotate(
        rotation * Math.PI / 180
    );

    ctx.drawImage(
        img,
        -renderWidth/2,
        -renderHeight/2,
        renderWidth,
        renderHeight
    );

    ctx.restore();

    if(cropMode && isDragging){

        const x =
        Math.min(cropStartX,cropEndX);

        const y =
        Math.min(cropStartY,cropEndY);

        const width =
        Math.abs(cropEndX - cropStartX);

        const height =
        Math.abs(cropEndY - cropStartY);

        ctx.strokeStyle =
        "#ffffff";

        ctx.lineWidth = 2;

        ctx.setLineDash([8]);

        ctx.strokeRect(
            x,
            y,
            width,
            height
        );

        ctx.fillStyle =
        "rgba(255,255,255,0.08)";

        ctx.fillRect(
            x,
            y,
            width,
            height
        );

        ctx.setLineDash([]);
    }
}

/* ===================================================== */
/* ADJUSTMENTS                                            */
/* ===================================================== */

brightnessSlider.addEventListener("input",()=>{

    adjustments.brightness =
    Number(brightnessSlider.value) + 100;

    brightnessValue.innerText =
    brightnessSlider.value + "%";

    drawImage();
});

contrastSlider.addEventListener("input",()=>{

    adjustments.contrast =
    Number(contrastSlider.value) + 100;

    contrastValue.innerText =
    contrastSlider.value + "%";

    drawImage();
});

saturationSlider.addEventListener("input",()=>{

    adjustments.saturation =
    Number(saturationSlider.value) + 100;

    saturationValue.innerText =
    saturationSlider.value + "%";

    drawImage();
});

/* ===================================================== */
/* FILTERS                                                */
/* ===================================================== */

function toggleFilter(card,name){

    const sliderBox =
    document.getElementById(name + "Slider");

    const isActive =
    card.classList.contains("active");

    document
    .querySelectorAll(".filter-card")
    .forEach(c=>{

        c.classList.remove("active");
    });

    document
    .querySelectorAll(".filter-slider")
    .forEach(s=>{

        s.classList.remove("active");
    });

    if(isActive){

        filters[name] = 0;

        const slider =
        sliderBox.querySelector("input");

        slider.value = 0;

        drawImage();

        return;
    }

    card.classList.add("active");

    sliderBox.classList.add("active");
}

function updateFilter(name,value){

    filters[name] = Number(value);

    drawImage();
}

/* ===================================================== */
/* TOOLS                                                  */
/* ===================================================== */

function activateTool(button){

    document
    .querySelectorAll(".tool-btn")
    .forEach(btn=>{

        btn.classList.remove("active");
    });

    button.classList.add("active");
}

/* ===================================================== */
/* ROTATE                                                 */
/* ===================================================== */

function rotateImage(){

    rotation += 90;

    drawImage();
}

/* ===================================================== */
/* FLIP                                                   */
/* ===================================================== */

function flipImage(){

    flip *= -1;

    drawImage();
}

/* ===================================================== */
/* ZOOM                                                   */
/* ===================================================== */

function zoomIn(){

    scale += 0.1;

    drawImage();
}

function zoomOut(){

    scale -= 0.1;

    if(scale < 0.2){

        scale = 0.2;
    }

    drawImage();
}

/* ===================================================== */
/* RESET                                                  */
/* ===================================================== */

function resetImage(){

    if(!originalImage) return;

    img = new Image();

    img.onload = function(){

        currentImage =
        originalImage;

        scale = 1;

        rotation = 0;

        flip = 1;

        adjustments = {

            brightness:100,
            contrast:100,
            saturation:100
        };

        filters = {

            bw:0,
            warm:0,
            cool:0,
            vintage:0,
            dreamy:0,
            neon:0,
            fade:0,
            cinema:0,
            soft:0,
            dark:0
        };

        brightnessSlider.value = 0;
        contrastSlider.value = 0;
        saturationSlider.value = 0;

        brightnessValue.innerText = "0%";
        contrastValue.innerText = "0%";
        saturationValue.innerText = "0%";

        document
        .querySelectorAll(".filter-card")
        .forEach(card=>{

            card.classList.remove("active");
        });

        document
        .querySelectorAll(".filter-slider")
        .forEach(slider=>{

            slider.classList.remove("active");

            slider.querySelector("input").value = 0;
        });

        drawImage();
    };

    img.src = originalImage;
}

/* ===================================================== */
/* SAVE                                                   */
/* ===================================================== */

function downloadImage(){

    const link =
    document.createElement("a");

    link.download =
    "edited-image.png";

    link.href =
    canvas.toDataURL();

    link.click();
}

/* ===================================================== */
/* CROP MODE                                              */
/* ===================================================== */

function activateCrop(button){

    cropMode = !cropMode;

    if(cropMode){

        activateTool(button);

        cropWarning.style.display =
        "block";

        setTimeout(()=>{

            cropWarning.style.display =
            "none";

        },2000);
    }
    else{

        button.classList.remove("active");
    }
}

/* ===================================================== */
/* CROP EVENTS                                            */
/* ===================================================== */

canvas.addEventListener("mousedown",(e)=>{

    if(!cropMode) return;

    isDragging = true;

    const rect =
    canvas.getBoundingClientRect();

    cropStartX =
    e.clientX - rect.left;

    cropStartY =
    e.clientY - rect.top;

    cropEndX = cropStartX;
    cropEndY = cropStartY;

    drawImage();
});

canvas.addEventListener("mousemove",(e)=>{

    if(!cropMode || !isDragging) return;

    const rect =
    canvas.getBoundingClientRect();

    cropEndX =
    e.clientX - rect.left;

    cropEndY =
    e.clientY - rect.top;

    drawImage();
});

canvas.addEventListener("mouseup",()=>{

    if(!cropMode || !isDragging) return;

    isDragging = false;

    applyCrop();
});

/* ===================================================== */
/* APPLY CROP                                             */
/* ===================================================== */

function applyCrop(){

    const x =
    Math.min(cropStartX,cropEndX);

    const y =
    Math.min(cropStartY,cropEndY);

    const width =
    Math.abs(cropEndX - cropStartX);

    const height =
    Math.abs(cropEndY - cropStartY);

    if(width < 20 || height < 20){

        drawImage();
        return;
    }

    const tempCanvas =
    document.createElement("canvas");

    const tempCtx =
    tempCanvas.getContext("2d");

    tempCanvas.width = width;
    tempCanvas.height = height;

    tempCtx.drawImage(
        canvas,
        x,
        y,
        width,
        height,
        0,
        0,
        width,
        height
    );

    const cropped =
    tempCanvas.toDataURL();

    currentImage = cropped;

    img.onload = ()=>{

        drawImage();
    };

    img.src = cropped;

    cropMode = false;

    document
    .querySelectorAll(".tool-btn")
    .forEach(btn=>{

        btn.classList.remove("active");
    });
}

/* ===================================================== */
/* RESIZE                                                 */
/* ===================================================== */

window.addEventListener(
"resize",
()=>{

    resizeCanvas();

    drawImage();
});

/* ===================================================== */
/* INIT                                                   */
/* ===================================================== */

resizeCanvas();

</script>
